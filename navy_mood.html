<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>NAVY MOOD | NIGHT CITY STATION</title>
  <meta property="og:title" content="나의 부산 여행 무드는 NAVY MOOD!">
  <meta property="og:description" content="NIGHT CITY STATION — <span class='tag'>#야경</span><span class='tag'>#도시감성</span><span class='tag'>#오션나이트</span><span class='tag'>#VISITBUSAN</span> #VISITBUSAN">
  <meta property="og:image" content="https://via.placeholder.com/800x800/1B3A6B/FFFFFF?text=NAVY MOOD">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#1B3A6B;min-height:100vh;display:flex;flex-direction:column;align-items:center;font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;padding:32px 20px 48px}
    .event-tag{font-size:11px;letter-spacing:.14em;font-weight:500;color:rgba(255,255,255,.55);margin-bottom:20px}
    .card{width:100%;max-width:360px;background:#fff;border-radius:20px;overflow:hidden;margin-bottom:14px;box-shadow:0 8px 32px rgba(0,0,0,.18)}
    .card-header{background:#1B3A6B;padding:22px 20px 16px}
    .mood-label{font-size:10px;letter-spacing:.14em;color:rgba(255,255,255,.55);font-weight:500;margin-bottom:4px}
    .mood-name{font-size:30px;font-weight:700;color:#fff;line-height:1.1;margin-bottom:2px}
    .station-name{font-size:13px;color:rgba(255,255,255,.72);margin-bottom:12px}
    .wave{display:flex;align-items:flex-end;gap:4px;height:22px}
    .wb{border-radius:3px;background:rgba(255,255,255,.22)}
    .result-img{width:100%;aspect-ratio:1/1;object-fit:cover;display:block}
    .card-body{padding:18px 20px 20px}
    .desc{font-size:13px;line-height:1.7;color:#444;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid #EEF2F6}
    .spot-label{font-size:10px;font-weight:600;letter-spacing:.1em;color:#1B3A6B;margin-bottom:8px}
    .spots{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:14px}
    .spot{background:#D8E8FF;border-radius:8px;padding:6px 4px;font-size:11px;color:#333;text-align:center;font-weight:600;line-height:1.35}
    .tags{display:flex;flex-wrap:wrap;gap:5px}
    .tag{font-size:12px;color:#333;background:#D8E8FF;border-radius:20px;padding:3px 10px;font-weight:500}
    .btns{width:100%;max-width:360px;display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
    .btn{width:100%;padding:15px;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;border:none;display:flex;align-items:center;justify-content:center;gap:8px;-webkit-tap-highlight-color:transparent}
    .btn:active{opacity:.85;transform:scale(.98)}
    .btn-save{background:#fff;color:#1B3A6B}
    .btn-insta{background:rgba(255,255,255,.15);color:#fff;border:1.5px solid rgba(255,255,255,.4)}
    .btn-kakao{background:#FEE500;color:#3A1D1D}
    .footer{font-size:11px;color:rgba(255,255,255,.4);text-align:center;line-height:1.8;letter-spacing:.04em}
    .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:#222;color:#fff;padding:12px 22px;border-radius:10px;font-size:13px;opacity:0;transition:all .3s;white-space:nowrap;z-index:999}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>
  <div class="event-tag">BUSAN STATION · 부산 여행 무드 테스트</div>
  <div class="card">
    <div class="card-header">
      <div class="mood-label">MY BUSAN MOOD</div>
      <div class="mood-name">NAVY MOOD</div>
      <div class="station-name">NIGHT CITY STATION</div>
      <div class="wave">
        <div class="wb" style="width:8px;height:10px"></div><div class="wb" style="width:8px;height:18px"></div>
        <div class="wb" style="width:8px;height:8px"></div><div class="wb" style="width:8px;height:22px"></div>
        <div class="wb" style="width:8px;height:14px"></div><div class="wb" style="width:8px;height:20px"></div>
        <div class="wb" style="width:8px;height:10px"></div><div class="wb" style="width:8px;height:16px"></div>
      </div>
    </div>
    <img class="result-img" src="https://via.placeholder.com/800x800/1B3A6B/FFFFFF?text=NAVY MOOD" alt="NAVY MOOD 결과 이미지" id="resultImg">
    <div class="card-body">
      <div class="desc">반짝이는 야경과 도시 무드를 즐기는 여행.<br>부산의 밤 풍경을 따라 떠나는 당신의 NEXT TRIP입니다.</div>
      <div class="spot-label">RECOMMENDED SPOTS</div>
      <div class="spots"><div class='spot'>광안대교</div><div class='spot'>마린시티</div><div class='spot'>기장 해안카페</div><div class='spot'>동백섬</div><div class='spot'>흰여울마을</div><div class='spot'>송도</div></div>
      <div class="tags"><span class='tag'>#야경</span><span class='tag'>#도시감성</span><span class='tag'>#오션나이트</span><span class='tag'>#VISITBUSAN</span></div>
    </div>
  </div>
  <div class="btns">
    <button class="btn btn-save" onclick="handleSave()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1B3A6B" stroke-width="2.5" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      결과 이미지 저장하기
    </button>
    <button class="btn btn-insta" onclick="handleInsta()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="#fff" stroke="none"/></svg>
      인스타그램 스토리 공유
    </button>
    <button class="btn btn-kakao" onclick="handleKakao()">
      <svg width="18" height="18" viewBox="0 0 24 24"><ellipse cx="12" cy="11" rx="10" ry="8" fill="#3A1D1D"/><path d="M7.5 14l2-5 2.5 3.5L14.5 9l2 5" fill="none" stroke="#FEE500" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      카카오톡으로 공유
    </button>
  </div>
  <div class="footer">#VISITBUSAN &nbsp;·&nbsp; #BUSANSTATION<br>부산관광공사 공식 부산 여행 무드 테스트</div>
  <div class="toast" id="toast"></div>
  <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js" integrity="sha384-TiCUE00h649CAMonG018J2ujOgDKW/kVWlChEuu4jK2vxfAAD0eZxzCKakxg55G4" crossorigin="anonymous"></script>
  <script>
    Kakao.init('e83c98033be5243712ad5f7d1c764e39');
    const PAGE_URL = location.href;
    const IMG_URL = document.getElementById('resultImg').src;
    function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800)}
    function handleSave(){const a=document.createElement('a');a.href=IMG_URL;a.download='NAVY_MOOD_부산여행결과.png';a.click();toast('이미지가 저장됩니다 📥')}
    function handleInsta(){window.location.href='instagram://story-camera';setTimeout(()=>toast('인스타그램 앱에서 스토리에 올려주세요! 📸'),1500)}
    function handleKakao(){if(!Kakao.isInitialized()){toast('카카오 SDK 초기화 실패');return}Kakao.Share.sendDefault({objectType:'feed',content:{title:'나의 부산 여행 무드는 NAVY MOOD!',description:'NIGHT CITY STATION — 반짝이는 야경과 도시 무드를 즐기는 여행. #VISITBUSAN',imageUrl:IMG_URL,link:{mobileWebUrl:PAGE_URL,webUrl:PAGE_URL}},buttons:[{title:'내 무드 확인하기',link:{mobileWebUrl:PAGE_URL,webUrl:PAGE_URL}}]})}
  </script>
</body>
</html>
