<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MY BUSAN MOOD — NAVY TYPE</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%;
    height: 100%;
    background: #0D0D0D;
    font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    overflow-x: hidden;
  }

  .page {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 0 0 40px;
  }

  /* ── 이미지 영역 ── */
  .result-image-wrap {
    width: 100%;
    max-width: 430px;
    position: relative;
    background: #111;
    /* 
      디자이너 이미지를 여기에 넣어주세요.
      9:16 비율 이미지 (1080×1920px) 권장
    */
  }

  .result-image-wrap img {
    width: 100%;
    display: block;
  }

  /* 이미지 없을 때 보이는 플레이스홀더 — 디자이너 이미지 받으면 <img> 태그로 교체 */
  .image-placeholder {
    width: 100%;
    aspect-ratio: 9 / 16;
    background: #1a1a1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: #444;
    font-size: 13px;
    letter-spacing: 0.04em;
  }

  .image-placeholder .ph-icon {
    width: 48px;
    height: 48px;
    border: 1.5px solid #333;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .image-placeholder .ph-icon svg {
    opacity: 0.4;
  }

  /* ── 버튼 영역 ── */
  .btn-area {
    width: 100%;
    max-width: 430px;
    padding: 20px 20px 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .btn {
    width: 100%;
    height: 52px;
    border: none;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 9px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.01em;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.1s;
    -webkit-appearance: none;
  }

  .btn:active {
    transform: scale(0.97);
    opacity: 0.9;
  }

  /* 저장 버튼 */
  .btn-save {
    background: #FFFFFF;
    color: #111111;
  }

  /* 인스타 버튼 */
  .btn-insta {
    background: #000000;
    color: #FFFFFF;
  }

  /* 카카오 버튼 */
  .btn-kakao {
    background: #FEE500;
    color: #191600;
  }

  .btn svg {
    flex-shrink: 0;
  }

  /* ── 토스트 ── */
  .toast {
    position: fixed;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: rgba(30,30,30,0.92);
    color: #fff;
    font-size: 13px;
    letter-spacing: 0.02em;
    padding: 10px 20px;
    border-radius: 100px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
    z-index: 999;
    backdrop-filter: blur(8px);
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>
<div class="page">

  <!-- ★ 이미지 영역 ★
       디자이너 이미지 받으면 아래 .image-placeholder 전체를 삭제하고
       <img src="blue_type.png" alt="NAVY TYPE 결과 이미지"> 로 교체하세요.
  -->
  <div class="result-image-wrap">
    <div class="image-placeholder">
      <div class="ph-icon">
        <svg width="22" height="22" fill="none" stroke="#888" stroke-width="1.5" viewBox="0 0 24 24">
          <rect x="3" y="3" width="18" height="18" rx="3"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <path d="M21 15l-5-5L5 21"/>
        </svg>
      </div>
      <span>NAVY TYPE 결과 이미지</span>
      <span style="font-size:11px; opacity:0.5;">1080 × 1920px</span>
    </div>
  </div>

  <!-- ★ 버튼 3개 ★ -->
  <div class="btn-area">

    <!-- 1. 결과 이미지 저장 -->
    <button class="btn btn-save" onclick="handleSave()">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      결과 이미지 저장하기
    </button>

    <!-- 2. 인스타그램 스토리 공유 -->
    <button class="btn btn-insta" onclick="handleInsta()">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <rect x="2" y="2" width="20" height="20" rx="5"/>
        <circle cx="12" cy="12" r="4.5"/>
        <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>
      </svg>
      인스타그램 스토리 공유
    </button>

    <!-- 3. 카카오톡 공유 -->
    <button class="btn btn-kakao" onclick="handleKakao()">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <ellipse cx="9" cy="8.2" rx="7.8" ry="6.3" fill="#191600"/>
        <path d="M5.8 10.8L6.9 7.8L8.5 10L10.1 7.8L11.2 10.8" stroke="#FEE500" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      카카오톡으로 공유
    </button>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  /* ── 설정값 (타입별로 수정) ── */
  const CONFIG = {
    type: 'NAVY TYPE',
    imageFile: 'navy_type.png',   /* 디자이너 파일명과 맞추세요 */
    kakaoKey: 'YOUR_KAKAO_KEY',   /* developers.kakao.com 에서 발급 */
    shareUrl: location.href,
    shareTitle: '나의 부산 여행 타입은 NAVY TYPE!',
    shareDesc: '역사 문화 탐방자 #역사 #문화 #예술 #VISITBUSAN',
  };

  /* ── 토스트 ── */
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(el._t);
    el._t = setTimeout(() => el.classList.remove('show'), 2400);
  }

  /* ── 저장 ── */
  function handleSave() {
    const a = document.createElement('a');
    a.href = CONFIG.imageFile;
    a.download = CONFIG.imageFile;
    a.click();
    toast('이미지를 저장합니다 📥');
  }

  /* ── 인스타그램 ── */
  function handleInsta() {
    /* 모바일: 인스타 앱으로 직접 이동 (스토리 카메라 오픈) */
    window.location.href = 'instagram://story-camera';
    setTimeout(() => toast('인스타 앱에서 이미지를 업로드하세요 📸'), 600);
  }

  /* ── 카카오톡 ── */
  function handleKakao() {
    if (window.Kakao && Kakao.isInitialized()) {
      Kakao.Share.sendDefault({
        objectType: 'feed',
        content: {
          title: CONFIG.shareTitle,
          description: CONFIG.shareDesc,
          imageUrl: location.origin + '/' + CONFIG.imageFile,
          link: { mobileWebUrl: CONFIG.shareUrl, webUrl: CONFIG.shareUrl }
        },
        buttons: [{ title: '내 타입 확인하기', link: { mobileWebUrl: CONFIG.shareUrl, webUrl: CONFIG.shareUrl } }]
      });
    } else {
      /* 카카오 SDK 없을 때 폴백 */
      const msg = encodeURIComponent(CONFIG.shareTitle + '\n' + CONFIG.shareDesc + '\n' + CONFIG.shareUrl);
      window.location.href = 'kakaotalk://send?text=' + msg;
      setTimeout(() => toast('카카오톡으로 공유합니다 💬'), 400);
    }
  }

  /* ── 카카오 SDK 초기화 (키 발급 후 주석 해제) ── */
  /*
  window.addEventListener('load', () => {
    if (window.Kakao && !Kakao.isInitialized()) {
      Kakao.init(CONFIG.kakaoKey);
    }
  });
  */
</script>

<!-- 카카오 SDK (키 발급 후 주석 해제) -->
<!-- <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js"></script> -->

</body>
</html>
